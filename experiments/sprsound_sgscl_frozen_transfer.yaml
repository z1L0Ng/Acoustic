id: sprsound_sgscl_frozen_transfer
question: Does a metadata-aware SG-SCL source model transfer when target device-domain metadata are unavailable?
implementation: baseline/sg_scl/checkpoint_eval
target_contract: acoustic/evaluation/sprsound_inter.py
requirements:
