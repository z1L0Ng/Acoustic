      license: "none_found"
    checkpoint:
      required: true
      provenance_class: "unresolved"
      source_url_or_storage_ref: null
      filename: "<FILENAME_OR_NULL>"
      size_bytes: null
      sha256: null
      canonical_state_dict_sha256: null
      identity_claim: "unresolved"
    rebuild:
      command: null
      receipt_path: "<RUN_ROOT>/receipts/rebuild.json"
    launch:
      smoke_command: null
      profile_100_command: null
      full_command: null
      evaluation_export_command: null
      expected_result_root: "result/add_rsc_<YYYYMMDD_HHMMSS>/"
    protocol:
      name: no_unique_faithful_protocol
      seed: 1
      test_selection: "held-out partition each epoch; best Score"
      claim_boundary: "paper-declared reconstruction and author-repo default must remain separate; neither is official faithful"
    resume:
      supported: false
      integration_test_passed: false
      command: null
    paper_target:
      ast_sp: 85.13
      ast_se: 45.94
      ast_score: 65.53
      score_sd: null
    acceptance_checks:
