      unique_cycle_ids_required: true
      metric_recompute_tolerance: 1.0e-10
      internal_alignment_rule: absolute_score_gap_lte_3

approval:
  local_baseline_thread_gate_report: "<PATH>"
  management_reviewed: false
  management_reviewer: "<NAME_OR_ROLE>"
  approved_at_utc: null
  server_execution_authorized: false
