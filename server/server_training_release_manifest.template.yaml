      commit_sha: 51f93fa6ffa580d0819ccb59f861582927937264
      license: "none_found"
    checkpoint:
      required: true
      provenance_class: "current_author_hosted"
      source_url_or_storage_ref: "<APPROVED_NON_SECRET_REFERENCE>"
      filename: audioset_16_16_0.4422.pth
      size_bytes: 350437422
      sha256: dc71a6d4d07aeb7e746547f72a141f404e4c167d660bf003179f3865e06a970c
      canonical_state_dict_sha256: e8284d4fb29332d92464b169f07c5a89532d87ac8c16404d32f405d998d8346c
      identity_claim: "current author-hosted checkpoint"
    rebuild:
      command: "<FRESH_CHECKOUT_REBUILD_COMMAND>"
      receipt_path: "<RUN_ROOT>/receipts/rebuild.json"
    launch:
      smoke_command: "<GPU_SMOKE_COMMAND>"
      profile_100_command: "<GPU_100_STEP_PROFILE_COMMAND>"
      full_command: "<FULL_COMMAND>"
      evaluation_export_command: "<EVALUATION_EXPORT_COMMAND>"
      expected_result_root: "result/mvst_<YYYYMMDD_HHMMSS>/"
    protocol:
      name: author_repo_random_file_split_official_like
      seed: 1
      test_selection: "author random-file test partition every epoch; best checkpoint by test Score"
      claim_boundary: "not an official ICBHI-split reproduction"
    resume:
      supported: false
      integration_test_passed: false
